<html>
    <head>
        <meta charset="UTF-8">
        <title>Joc 2: Emocions</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body> 
    <header>
        <h1 style="text-align: center;">Joc2: Emocions</h1>
        <p style="text-align: center;">Mira la careta i adivina quina emocio sent</p>
    </header>
    
    <div class="scoreboard">
        <span class="pill">⭐ Emcerts: <span id="score">0</span></span>
        <span class="pill">🎯 Ronda: <span id="round">1</span> / <span id="total-rounds">8</span></span>
    </div>
    
    <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    
    <main class="game-card" id="game-card">
        <p class="prompt">Com es sent aquesta?</p>
        <div class="face" id="face">🙂</div>
        <div class="options" id="options"></div>
        <p class="feedback" id="feedback"></p>
        <button class="next-btn" id="next-btn">Següent ▶</button>
    </main>
    
    <main class="game-card end-screen" id="end-screen">
        <div class="face" id="end-face">🏆</div>
        <h2 id="end-title">Bona feina!</h2>
        <p id="end-text">Has encertat X de 8</p>
        <button class="restart-btn" id="restart-btn">Jugar una altra vegada</button>
    </main>
    
    <script>
    // Banco de emociones: emoji + nombre correcto
    const emotions = [
        { face: "😊", name: "Felicitat" },
        { face: "😢", name: "Tristesa" },
        { face: "😠", name: "Enuig" },
        { face: "😨", name: "Por" },
        { face: "😲", name: "Sorpresa" },
        { face: "🤢", name: "Fastig" },
        { face: "😴", name: "Cansanci" },
        { face: "😍", name: "Amor" },
        { face: "😳", name: "Vergonya" },
        { face: "😎", name: "Confiansa" },
        { face: "😐", name: "Indiferència" },
        { face: "😇", name: "Puresa" },
        { face: "🤔", name: "Confusió" },
        { face: "😤", name: "Frustració" },
        { face: "😜", name: "Diversió" },
        { face: "😞", name: "Decepció" },
        { face: "😡", name: "Furia" },
        { face: "😰", name: "Ansietat" },
        { face: "😌", name: "Alleujament" },
        { face: "🤯", name: "Xoc" }
    ];
    
    const TOTAL_ROUNDS = 8;
    
    let round = 0;
    let score = 0;
    let currentAnswer = "";
    let shuffled = [];
    
    const faceEl = document.getElementById("face");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const roundEl = document.getElementById("round");
    const totalRoundsEl = document.getElementById("total-rounds");
    const progressFill = document.getElementById("progress-fill");
    const gameCard = document.getElementById("game-card");
    const endScreen = document.getElementById("end-screen");
    const endTitle = document.getElementById("end-title");
    const endText = document.getElementById("end-text");
    const endFace = document.getElementById("end-face");
    const restartBtn = document.getElementById("restart-btn");
    
    totalRoundsEl.textContent = TOTAL_ROUNDS;
    
    function shuffle(arr){
        const copy = [...arr];
        for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }
    
    function startGame(){
        round = 0;
        score = 0;
        shuffled = shuffle(emotions).slice(0, TOTAL_ROUNDS);
        endScreen.style.display = "none";
        gameCard.style.display = "block";
        nextRound();
    }
    
    function nextRound(){
        if(round >= TOTAL_ROUNDS){
        showEnd();
        return;
        }
    
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
        nextBtn.style.display = "none";
    
        const current = shuffled[round];
        currentAnswer = current.name;
        faceEl.textContent = current.face;
        faceEl.style.animation = "none";
        requestAnimationFrame(() => { faceEl.style.animation = "pop 0.35s ease"; });
    
        // Generar 4 opciones (1 correcta + 3 distractores)
        const distractors = shuffle(
        emotions.filter(e => e.name !== currentAnswer)
        ).slice(0, 3).map(e => e.name);
    
        const allOptions = shuffle([currentAnswer, ...distractors]);
    
        optionsEl.innerHTML = "";
        allOptions.forEach(name => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = name;
        btn.addEventListener("click", () => selectOption(btn, name));
        optionsEl.appendChild(btn);
        });
    
        round++;
        roundEl.textContent = round;
        scoreEl.textContent = score;
        progressFill.style.width = `${((round - 1) / TOTAL_ROUNDS) * 100}%`;
    }
    
    function selectOption(button, chosen){
        const allButtons = optionsEl.querySelectorAll(".option");
        allButtons.forEach(b => b.classList.add("disabled"));
    
        if(chosen === currentAnswer){
        button.classList.add("correct");
        feedbackEl.textContent = "Correcte! 🎉 Es " + currentAnswer.toLowerCase() + ".";
        feedbackEl.classList.add("ok");
        score++;
        scoreEl.textContent = score;
        } else {
        button.classList.add("wrong");
        allButtons.forEach(b => {
            if(b.textContent === currentAnswer) b.classList.add("correct");
        });
        feedbackEl.textContent = "Casi... la resposta correcta era " + currentAnswer.toLowerCase() + ".";
        feedbackEl.classList.add("ko");
        }
    
        progressFill.style.width = `${(round / TOTAL_ROUNDS) * 100}%`;
        nextBtn.style.display = "inline-block";
    }
    
    function showEnd(){
        gameCard.style.display = "none";
        endScreen.style.display = "block";
        progressFill.style.width = "100%";
    
        let msg, face;
        if(score === TOTAL_ROUNDS){
        msg = "Perfecte! Ets un expert en emocions.";
        face = "🏆";
        } else if(score >= TOTAL_ROUNDS * 0.6){
        msg = "Molt bé! Vas reconeixent les emocions cada vegada millor.";
        face = "🌟";
        } else {
        msg = "Segueix practicant! Cada emoció té la seva propia careta.";
        face = "💪";
        }
    
        endFace.textContent = face;
        endTitle.textContent = msg;
        endText.textContent = `Has encertat ${score} de ${TOTAL_ROUNDS}`;
    }
    
    nextBtn.addEventListener("click", nextRound);
    restartBtn.addEventListener("click", startGame);
    
    startGame();
</script>
 
    </body>
</html>
