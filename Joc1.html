<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Joc de Pictogrames</title>
    <link rel="stylesheet" href="estils.css">
</head>

<body>

    <div class="game-wrapper">
        <div id="phaseHeader" class="phase-header">Fase 1: Relacionar paraules i pictogrames</div>

        <div class="main-container">
            
            <div class="sidebar">
                <h3>Progrés</h3>
                <div id="progressContainer" class="progress-container">
                    <div class="circle" id="c1">1</div>
                    <div class="circle" id="c2">2</div>
                    <div class="circle" id="c3">3</div>
                    <div class="circle" id="c4">4</div>
                    <div class="circle" id="c5">5</div>
                    <div class="circle" id="c6">6</div>
                    <div class="circle" id="c7">7</div>
                    <div class="circle" id="c8">8</div>
                    <div class="circle" id="c9">9</div>
                    <div class="circle" id="c10">10</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <h1>🗣️ Joc de Pictogrames</h1>
                    <div>
                        <div class="score-badge">⭐ <span id="score">0</span> Punts</div>
                    </div>
                    <h2 id="question"></h2>
                </div>

                <div id="options" class="options"></div>
                <div id="msg"></div>

                <div class="exit-container">
                    <button class="btn-exit" onclick="showExitModal()">🚪 Acabar Joc</button>
                </div>
            </div>

        </div>
    </div>

    <div id="exitModal" class="modal-overlay">
        <div class="modal-box">
            <h3>⚠️ Alerta</h3>
            <p>Estàs segur que vols acabar la partida actual i tornar al menú?</p>
            <div class="modal-buttons">
                <button class="btn-modal confirm" onclick="redirectToMenu()">Sí, vull sortir</button>
                <button class="btn-modal cancel" onclick="hideExitModal()">Cancel·lar</button>
            </div>
        </div>
    </div>

    <script src="dades.js"></script>

    <script>
        let score = 0, currentPhase = 1;
        let currentQuestionIdx = 1; 
        const maxQuestions = 10; 

        function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }
        
        function update() {
            if (score < 40) {
                currentPhase = 1;
                phaseHeader.textContent = "Fase 1: Relacionar paraules i pictogrames";
            } else if (score >= 40 && score < 80) {
                currentPhase = 2;
                phaseHeader.textContent = "Fase 2: Construir frases";
            } else {
                currentPhase = 3;
                phaseHeader.textContent = "Fase 3: Situacions i contexts diaris";
            }
            scoreEl.textContent = score;
        }

        const modal = document.getElementById("exitModal");
        const phaseHeader = document.getElementById("phaseHeader");

        function showExitModal() { modal.classList.add("active"); }
        function hideExitModal() { modal.classList.remove("active"); }
        function redirectToMenu() { window.location.href = "menu.html"; }

        function updateProgressCircle(isCorrect) {
            const circle = document.getElementById(`c${currentQuestionIdx}`);
            if (circle) {
                if (isCorrect) {
                    circle.className = "circle correct";
                    circle.textContent = "✓";
                } else {
                    circle.className = "circle incorrect";
                    circle.textContent = "✕";
                }
                currentQuestionIdx++;
            }
        }

        function resetProgressBar() {
            currentQuestionIdx = 1;
            for (let i = 1; i <= maxQuestions; i++) {
                const circle = document.getElementById(`c${i}`);
                if (circle) {
                    circle.className = "circle";
                    circle.textContent = i;
                }
            }
        }

        const question = document.getElementById("question");
        const options = document.getElementById("options");
        const msg = document.getElementById("msg");
        const scoreEl = document.getElementById("score");

        function next() {
            if (currentQuestionIdx > maxQuestions) {
                resetProgressBar();
            }

            msg.textContent = "";
            options.innerHTML = "";

            if (currentPhase === 1) {
                const correct = data[Math.floor(Math.random() * data.length)];
                const isWordToPic = Math.random() < 0.5;

                if (isWordToPic) {
                    question.textContent = 'Quin pictograma és: "' + correct.w + '"?';
                    const opts = shuffle([correct, ...shuffle(data.filter(x => x !== correct)).slice(0, 3)]);
                    opts.forEach(o => {
                        const b = document.createElement('button');
                        b.className = 'btn'; b.textContent = o.e;
                        b.onclick = () => check(o === correct);
                        options.appendChild(b);
                    });
                } else {
                    question.textContent = 'Quina paraula descriu aquest pictograma ' + correct.e + ' ?';
                    const opts = shuffle([correct, ...shuffle(data.filter(x => x !== correct)).slice(0, 3)]);
                    opts.forEach(o => {
                        const b = document.createElement('button');
                        b.className = 'btn'; b.textContent = o.w;
                        b.onclick = () => check(o === correct);
                        options.appendChild(b);
                    });
                }
            }
            else if (currentPhase === 2) {
                const subjectes = ["👦", "👧", "🐶", "🐱", "🦁", "🐼"];
                const verbs = ["🍽️", "🥤", "🏃", "😴", "🎨", "📖"];
                const objectes = ["🍎", "🍞", "🥛", "🧃", "📚", "🏠"];

                const s = subjectes[Math.floor(Math.random() * subjectes.length)];
                const v = verbs[Math.floor(Math.random() * verbs.length)];
                const o = objectes[Math.floor(Math.random() * objectes.length)];
                
                const sentence = [s, v, o];
                let idx = 0;
                
                question.textContent = "Ordena per fer la frase correcta:";
                
                let distractor = data[Math.floor(Math.random() * data.length)].e;
                while(sentence.includes(distractor)) {
                    distractor = data[Math.floor(Math.random() * data.length)].e;
                }

                const all = shuffle([...sentence, distractor]);
                
                all.forEach(sym => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = sym;
                    b.onclick = () => {
                        if (sym === sentence[idx]) {
                            idx++;
                            b.disabled = true;
                            if (idx === sentence.length) { 
                                score += 10; 
                                updateProgressCircle(true); 
                                update(); 
                                next(); 
                            }
                        } else {
                            score = Math.max(0, score - 5);
                            updateProgressCircle(false);
                            update();
                            msg.textContent = "❌ Incorrecte";
                            setTimeout(next, 700);
                        }
                    };
                    options.appendChild(b);
                });
            }
            else {
                const situacions = [
                    { q: "Està plovent molt fort a fora 🌧️, què necessites per no banyar-te?", correct: "🌂", opts: ["🪑", "🚲", "🍉"] },
                    { q: "Tens molta gana i vols esmorzar sa, què pots menjar? 🥣", correct: "🍎", opts: ["🔑", "🚗", "💻"] },
                    { q: "Fa molta calor i vols anar ràpid a la platja 🌊, quin transport agafes?", correct: "🚗", opts: ["🛏️", "🧸", "📚"] },
                    { q: "S'ha fet de nit i estàs molt cansat, on vas directament? 🌙", correct: "🛏️", opts: ["🍕", "🚀", "🧼"] },
                    { q: "Vols fer un dibuix molt bonic en un llibre, què fas servir?", correct: "🎨", opts: ["🐱", "🚂", "🍞"] }
                ];

                const sit = situacions[Math.floor(Math.random() * situacions.length)];
                question.textContent = sit.q;

                const finalOpts = shuffle([sit.correct, ...sit.opts]);
                finalOpts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = opt;
                    b.onclick = () => check(opt === sit.correct);
                    options.appendChild(b);
                });
            }
        }

        function check(ok) {
            if (ok) { 
                score += 10; 
                msg.textContent = "✅ Correcte"; 
            } else { 
                score = Math.max(0, score - 5); 
                msg.textContent = "❌ Incorrecte"; 
            }
            
            updateProgressCircle(ok); 
            update();
            setTimeout(next, 700);
        }
        
        update();
        next();
    </script>
</body>

</html>
