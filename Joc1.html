<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Joc de Pictogrames</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h1>🗣️ Joc de Pictogrames</h1>
        <div class="info">
            <div>Nivell: <span id="level">1</span></div>
            <div>Punts: <span id="score">0</span></div>
            <div>Vides: <span id="lives">3</span></div>
        </div>
        <h2 id="question"></h2>
        <div id="options" class="options"></div>
        <div id="msg"></div>
    </div>
    <script>
        const data = [
            { e: "🍎", w: "poma" }, { e: "🍞", w: "pa" }, { e: "🥛", w: "llet" },
            { e: "🐶", w: "gos" }, { e: "🐱", w: "gat" }, { e: "🏃", w: "corro" },
            { e: "🍽️", w: "menjo" }, { e: "💧", w: "bec" }
        ];
        let score = 0, lives = 3, level = 1;

        function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }
        function update() {
            level = Math.min(3, Math.floor(score / 50) + 1);
            levelEl.textContent = level;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            if (lives <= 0) { question.textContent = "Joc acabat"; options.innerHTML = ""; }
        }
        const question = document.getElementById("question");
        const options = document.getElementById("options");
        const msg = document.getElementById("msg");
        const levelEl = document.getElementById("level");
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");

        function next() {
            if (lives <= 0) return;
            msg.textContent = "";
            options.innerHTML = "";

            if (level === 1) {
                const correct = data[Math.floor(Math.random() * data.length)];
                question.textContent = 'Selecciona: ' + correct.w;
                const opts = shuffle([correct, ...shuffle(data.filter(x => x !== correct)).slice(0, 3)]);
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = o.e;
                    b.onclick = () => check(o === correct);
                    options.appendChild(b);
                });
            }
            else if (level === 2) {
                const correct = data[Math.floor(Math.random() * data.length)];
                question.textContent = 'Quina paraula és ' + correct.e + ' ?';
                const opts = shuffle([correct, ...shuffle(data.filter(x => x !== correct)).slice(0, 3)]);
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = o.w;
                    b.onclick = () => check(o === correct);
                    options.appendChild(b);
                });
            }
            else {
                const sentence = [
                    ["👦", "🍽️", "🍎"],
                    ["👦", "💧", "🥛"]
                ][Math.floor(Math.random() * 2)];
                let idx = 0;
                question.textContent = "Construeix la frase amb pictogrames";
                const all = shuffle([...sentence, "🐶"]);
                all.forEach(sym => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = sym;
                    b.onclick = () => {
                        if (sym === sentence[idx]) {
                            idx++;
                            b.disabled = true;
                            if (idx === sentence.length) { score += 10; update(); next(); }
                        } else {
                            lives--; update();
                        }
                    };
                    options.appendChild(b);
                });
            }
        }

        function check(ok) {
            if (ok) { score += 10; msg.textContent = "✅ Correcte"; }
            else { lives--; msg.textContent = "❌ Incorrecte"; }
            update();
            setTimeout(next, 700);
        }
        update();
        next();
    </script>
</body>

</html>
